apiVersion: apps/v1
kind: Deployment
metadata:
  name: quick-chat-web
  namespace: quick-chat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quick-chat-web
  template:
    metadata:
      labels:
        app: quick-chat-web
    spec:
      containers:
        - name: quick-chat-web
          image: quick-chat-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
